<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">    
    <link rel="stylesheet" href="/css/bootstrap.css">
    <title>course program dashboard</title>
</head>
<body>
   <div class="container container text-center mt-5">
    <h1>Course program Dashboard</h1>
      <br>
   
    <ul class="breadcrumb">
        <li class="breadcrumb-item"><a href ="*">home</a></li>
        <li class="breadcrumb-item"><a href="*">courses</a></li>
        <li class="breadcrumb-item active" aria-current="page">web development</li>
        </li>
    </ul>
     <h2> Web Development Course <span class= "badge badge-primary">new</span></h2>
     <label class="container">HTML</label>
    <div class="progress mb-3">
            <div class="progress-bar progress-bar-striped bg-success"
                style="width:100%">
                100% Complete
            </div>
    </div>
     <label class="container"> CSS</label>
     <div class="progress">
        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:75%">75%</div>

     </div>
      <label class="container">javascript</label>
      <div class="progress">
        <div class="progress-bar bg-warning" style="width:50%">50%  </div>

      </div>
      <label class="container">Bootstrap</label>
      <div class="progress">
        <div class="progress-bar bg-danger" style="width: 25%">25%</div>
      </div>
    <br>
    <button type ="button" class="btn btn-success">start</button>
    <button type ="button" class="btn btn-warning">pause</button>
    <button type ="button" class="btn btn-info">reset</button>
     <div class="container mt-4">
  <ul class="pagination justify-content-center">
  <li class="page-item"><a class="page-link" href="#">Previous</a></li>
    <li class="page-item active"><a class="page-link" href="#">1</a></li>

  <li class="page-item"><a class="page-link" href="#">2</a></li>
   <li class="page-item disabled"><a class="page-link" href="#">3</a></li>
  <li class="page-item"><a class="page-link" href="#">Next</a></li>
 </ul>
 </div>











   </div> 


 <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="/js/bootstrap.js"></script>




</body>
</html>
