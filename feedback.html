<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <title>Feedback Form</title>
</head>
<body>
 <div class="container py-5">
    <h2>FEEDBACK FORM</h2>
   <div class="form-group">
    <label for="name">Name:</label>
    <input type="text" class="form-control" id="name" placeholder="enter your name" name="name">
   </div> 
   <div class="form-group">
    <label for="email">E-mail:</label>
    <input type="text" class="form-control" id="email" placeholder="enter your E-mail id" name="email">
   </div>
   <div class="form-group">
    <label for="feedback message">Feedback Message:</label>
    <textarea class="form-control" row="3" id="feedback"></textarea>
   </div>
   <div class="form-group">
    <label>how do you know about our website</label>
        <select class="form-control">
            <option>by social media</option>
            <option>by friends</option>
            <option>by other ways</option>
        </select>
   </div>
   <div class="form-group">satisfaction level</div>
   <div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input "name="optradio">1
  </label>
</div>
<div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input "name="optradio">2
  </label>
</div>
<div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input "name="optradio">3
  </label>
</div>
<div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input "name="optradio">4
  </label>
</div>
<div class="form-check">
  <label class="form-check-label">
    <input type="radio" class="form-check-input "name="optradio">5
  </label>
</div>
<div class="text-center mt-3">
    <button type="submit" class="btn btn-primary">Submit</button>
</div>  



</div>

</div>







</div>
  
 <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="/js/bootstrap.js"></script> 
</body>
</html>
