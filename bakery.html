<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-4">
  <div class="card">
    <div class="card-body">
        <h3  class="card-title">cakeshore bakery</h3>
      
        <form>
    <div class="form-group">
        <label for="Name"> Name</label>
        <input type="text" class="form-control" id="Name" placeholder="Enter your name">
    </div>
    <div class="form-group">
        <label for="email"> Email</label>
        <input type="email" class="form-control" id="email" placeholder="Enter the email">
    </div>
    <div class="form-group">
        <label for="comment"> Feedback</label>
        <textarea class="form-control" rows="4" id="comment" placeholder="Enter your Feedback required"></textarea>
    </div>
    <div class="form-group">
        <label>Preferred Contact Method</label><br>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="contactMethod" id="contactEmail" value="Email">
          <label class="form-check-label" for="contactEmail">Email</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="contactMethod" id="contactPhone" value="Phone">
          <label class="form-check-label" for="contactPhone">Phone</label>
        </div>
      </div>
    
    <div class="form-group">
        <label for="source">Choose your Item</label>
        <select class="form-control" id="source">
          <option value="">Select an item</option>
          <option>Puffs</option>
          <option>Cakes</option>
          <option>juices</option>
          <option>cookies</option>
        </select>
      </div>
    
    <div class="form-group">
        <label for="satisfaction">Satisfaction Level (1–10)</label>
        <input type="range" class="form-control-range" id="satisfaction" min="1" max="10">
      </div>
    
<button type="submit" class="btn btn-primary"> Submit</button>
</div></div></div>
</form>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</body>
</html>
